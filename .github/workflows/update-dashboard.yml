name: Update South Sudan Dashboard

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC — adjust as you like
  workflow_dispatch: {}    # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed to commit the refreshed dashboard back to the repo

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          HDX_API_TOKEN: ${{ secrets.HDX_API_TOKEN }}
          RELIEFWEB_APPNAME: ${{ secrets.RELIEFWEB_APPNAME }}
        run: |
          python generate_dashboard.py \
            --country "South Sudan" \
            --iso3 SSD \
            --indicators all \
            --output-html docs/index.html \
            --output-csv-dir data

      - name: Commit refreshed dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
